<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
     
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[200px] mx-auto pt-20">
        <img src="assets/github-logo.png" class="block mx-auto" alt="">
    </div>

    <div class="text-center pt-6">
        <h2 class="font-semibold text-[24px] text-[#1f2937]">GitHub Issues Tracker</h2>
        <p class="text-[#64748b]">Sign in to manage your issues</p>
    </div>

    <div class="form pt-6">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-md">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">User Name</label>
          <input id="input-name" type="text" class="input rounded-md bg-base-200" placeholder="Enter Username" />
          <br>
          <label class="label text-neutral font-bold">Password</label>
          <input id="input-password" type="password" maxlength="8" class="input rounded-md bg-base-200" placeholder="Enter Password" />
          <button id="signin-btn" class="btn btn-primary mt-4 rounded-md">Sign In</button>
        </fieldset>
      </div>
    </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
